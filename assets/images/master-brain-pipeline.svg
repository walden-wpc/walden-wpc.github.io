<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" width="780" height="580" font-family="Georgia, 'Times New Roman', serif">

  <rect width="780" height="580" fill="#fafaf8"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="13" letter-spacing="2.5" fill="#1a1a1a" font-style="italic">Analysis Pipeline</text>
  <line x1="150" y1="38" x2="306" y2="38" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="474" y1="38" x2="630" y2="38" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- ═══ LEFT SPINE LABELS (independent, fixed left) ═══ -->
  <text x="8" y="82"  font-size="7.5" fill="#bbb" letter-spacing="1">INPUT</text>
  <text x="8" y="155" font-size="7.5" fill="#bbb" letter-spacing="1">PREP</text>
  <text x="8" y="248" font-size="7.5" fill="#bbb" letter-spacing="1">BUILD</text>
  <text x="8" y="365" font-size="7.5" fill="#bbb" letter-spacing="1">ANALYSIS</text>
  <text x="8" y="468" font-size="7.5" fill="#bbb" letter-spacing="1">CORR</text>
  <text x="8" y="535" font-size="7.5" fill="#bbb" letter-spacing="1">OUTPUT</text>
  <line x1="56" y1="55" x2="56" y2="558" stroke="#e0ddd6" stroke-width="0.7" stroke-dasharray="3 3"/>

  <!-- ═══ MAIN CONTENT GROUP — translate(x,0) to center ═══ -->
  <!-- Total content width: 620px. Canvas inner width (780-60left-60right)=660. Offset = 60 + (660-620)/2 = 80 -->
  <g transform="translate(180, 0)">

    <!-- LAYER 1: INPUT -->
    <rect x="0"   y="57" width="200" height="46" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="100" y="76" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="bold" letter-spacing="0.5">dMRI</text>
    <text x="100" y="93" text-anchor="middle" font-size="9.5" fill="#666">Diffusion MRI · DWI</text>

    <rect x="220" y="57" width="200" height="46" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="320" y="76" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="bold" letter-spacing="0.5">T1-weighted MRI</text>
    <text x="320" y="93" text-anchor="middle" font-size="9.5" fill="#666">Structural Reference</text>

    <!-- arrows 1→2 -->
    <line x1="100" y1="103" x2="100" y2="122" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="95,119 100,126 105,119" fill="#1a1a1a"/>
    <line x1="320" y1="103" x2="320" y2="122" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="315,119 320,126 325,119" fill="#1a1a1a"/>

    <!-- LAYER 2: PREPROCESSING -->
    <rect x="0"   y="126" width="200" height="46" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="100" y="145" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="bold" letter-spacing="0.5">iDIO Pipeline</text>
    <text x="100" y="162" text-anchor="middle" font-size="9.5" fill="#666">Denoise · Eddy · Bias Correction</text>

    <rect x="220" y="126" width="200" height="46" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="320" y="145" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="bold" letter-spacing="0.5">CSD · iFOD2</text>
    <text x="320" y="162" text-anchor="middle" font-size="9.5" fill="#666">Fibre Orientation · Tractography</text>

    <!-- merge 2→3 -->
    <line x1="100" y1="172" x2="100" y2="194" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="320" y1="172" x2="320" y2="194" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="100" y1="194" x2="210" y2="194" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="320" y1="194" x2="210" y2="194" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="210" y1="194" x2="210" y2="210" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="205,207 210,214 215,207" fill="#1a1a1a"/>

    <!-- LAYER 3: COMMIT2 (centered in 420px content, width 300, x=60) -->
    <rect x="60" y="214" width="300" height="58" rx="4" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.2"/>
    <text x="210" y="236" text-anchor="middle" font-size="12" fill="#fafaf8" font-weight="bold" letter-spacing="1">COMMIT2</text>
    <text x="210" y="252" text-anchor="middle" font-size="9.5" fill="#bbb">Microstructure-Informed Tractography</text>
    <text x="210" y="265" text-anchor="middle" font-size="9" fill="#777">Convex Optimisation · Group Lasso · Weighted Connectome</text>

    <!-- split 3→4 -->
    <line x1="210" y1="272" x2="210" y2="290" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="20"  y1="290" x2="400" y2="290" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="20"  y1="290" x2="20"  y2="304" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="15,301 20,308 25,301" fill="#1a1a1a"/>
    <line x1="210" y1="290" x2="210" y2="304" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="205,301 210,308 215,301" fill="#1a1a1a"/>
    <line x1="400" y1="290" x2="400" y2="304" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="395,301 400,308 405,301" fill="#1a1a1a"/>

    <!-- LAYER 4: THREE TRACKS (each 120px wide, gap 10px, total=380px, centered in 420) -->
    <!-- Global: x=0 -->
    <rect x="0"   y="308" width="120" height="110" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <text x="60"  y="326" text-anchor="middle" font-size="9.5" fill="#1a1a1a" font-weight="bold" letter-spacing="1.5">GLOBAL</text>
    <line x1="10" y1="333" x2="110" y2="333" stroke="#1a1a1a" stroke-width="0.4"/>
    <text x="60"  y="349" text-anchor="middle" font-size="9" fill="#444">ANCOVA</text>
    <text x="60"  y="364" text-anchor="middle" font-size="9" fill="#444">Global Strength</text>
    <text x="60"  y="379" text-anchor="middle" font-size="9" fill="#444">Global Efficiency</text>
    <text x="60"  y="396" text-anchor="middle" font-size="8.5" fill="#888">FDR Correction</text>

    <!-- Nodal: x=150 -->
    <rect x="150" y="308" width="120" height="110" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <text x="210" y="326" text-anchor="middle" font-size="9.5" fill="#1a1a1a" font-weight="bold" letter-spacing="1.5">NODAL</text>
    <line x1="160" y1="333" x2="260" y2="333" stroke="#1a1a1a" stroke-width="0.4"/>
    <text x="210" y="349" text-anchor="middle" font-size="9" fill="#444">Graph Theory · bctpy</text>
    <text x="210" y="364" text-anchor="middle" font-size="9" fill="#444">Strength · Clustering</text>
    <text x="210" y="379" text-anchor="middle" font-size="9" fill="#444">Efficiency · Centrality</text>
    <text x="210" y="396" text-anchor="middle" font-size="8.5" fill="#888">FDR Correction</text>

    <!-- Edge NBS: x=300 -->
    <rect x="300" y="308" width="120" height="110" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <text x="360" y="326" text-anchor="middle" font-size="9.5" fill="#1a1a1a" font-weight="bold" letter-spacing="1.5">EDGE · NBS</text>
    <line x1="310" y1="333" x2="410" y2="333" stroke="#1a1a1a" stroke-width="0.4"/>
    <text x="360" y="349" text-anchor="middle" font-size="9" fill="#444">Network-Based Statistics</text>
    <text x="360" y="364" text-anchor="middle" font-size="9" fill="#444">Permutation × 10,000</text>
    <text x="360" y="379" text-anchor="middle" font-size="9" fill="#444">GPU Accelerated</text>
    <text x="360" y="396" text-anchor="middle" font-size="8.5" fill="#888">CuPy · CUDA</text>

    <!-- LAYER 5: CLINICAL CORRELATION -->
    <line x1="60"  y1="418" x2="60"  y2="444" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="210" y1="418" x2="210" y2="444" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="60"  y1="444" x2="210" y2="444" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="205,441 210,448 215,441" fill="#1a1a1a"/>

    <rect x="60" y="448" width="300" height="46" rx="4" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5 3"/>
    <text x="210" y="467" text-anchor="middle" font-size="10" fill="#555" font-weight="bold" letter-spacing="1">CLINICAL CORRELATION</text>
    <text x="210" y="483" text-anchor="middle" font-size="9.5" fill="#777">Partial Correlation · Age / Sex Covariate</text>

    <!-- merge to output -->
    <line x1="210" y1="494" x2="210" y2="512" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="360" y1="418" x2="360" y2="504" stroke="#1a1a1a" stroke-width="0.9"/>
    <line x1="360" y1="504" x2="210" y2="504" stroke="#1a1a1a" stroke-width="0.9"/>
    <polygon points="205,509 210,516 215,509" fill="#1a1a1a"/>

    <!-- LAYER 6: OUTPUT -->
    <rect x="30" y="516" width="360" height="44" rx="4" fill="#f0ede6" stroke="#1a1a1a" stroke-width="1"/>
    <text x="210" y="534" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" letter-spacing="1">Statistical Results</text>
    <text x="210" y="550" text-anchor="middle" font-size="9.5" fill="#555">CSV Reports · Interactive 3D Visualisation · Plotly</text>

  </g>
</svg>
